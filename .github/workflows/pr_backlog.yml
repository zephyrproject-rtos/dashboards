name: PR Backlog Analysis

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      age:
        description: 'Minimum PR age in days'
        required: false
        default: '30'
      max_prs:
        description: 'Maximum number of PRs to analyse'
        required: false
        default: '600'
      exclude_drafts:
        description: 'Exclude draft PRs'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-pr-backlog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Dashboard scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1

      - name: Checkout Zephyr (for MAINTAINERS.yml)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: zephyrproject-rtos/zephyr
          path: zephyr
          fetch-depth: 1

      - name: Install dependencies
        run: |
          python3 -m pip install --user PyGithub PyYAML awscli==1.45.11
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Restore cache and history from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_TESTING_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_TESTING_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          PUBLISH_BUCKET="testing.zephyrproject.org"
          PUBLISH_ROOT="dashboards/pr-backlog"

          aws s3 cp "s3://${PUBLISH_BUCKET}/${PUBLISH_ROOT}/pr_backlog_cache.json" \
            pr_backlog_cache.json || echo "No cache found in S3, starting fresh."
          aws s3 cp "s3://${PUBLISH_BUCKET}/${PUBLISH_ROOT}/pr_backlog_history.json" \
            pr_backlog_history.json || echo "No history found in S3, starting fresh."

      - name: Run PR backlog analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export ZEPHYR_BASE="$PWD/zephyr"
          ARGS=(
            --maintainer-file zephyr/MAINTAINERS.yml
            --output pr_backlog.html
            --history pr_backlog_history.json
            --cache pr_backlog_cache.json
            --age "${{ inputs.age || '30' }}"
            --max-prs "${{ inputs.max_prs || '600' }}"
            --exclude-drafts
            --verbose
          )
          # exclude drafts for now.
          #if [[ "${{ inputs.exclude_drafts }}" == "true" ]]; then
          #  ARGS+=(--exclude-drafts)
          #fi
          python3 scripts/analyze_pr_backlog.py "${ARGS[@]}"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-backlog-report
          path: pr_backlog.html

      - name: Upload history
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-backlog-history
          path: pr_backlog_history.json
          if-no-files-found: ignore

      - name: Upload cache
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pr-backlog-cache
          path: pr_backlog_cache.json
          if-no-files-found: ignore

      - name: Publish to AWS S3
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.AWS_TESTING_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_TESTING_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          PUBLISH_BUCKET="testing.zephyrproject.org"
          PUBLISH_DOMAIN="testing.zephyrproject.io"
          PUBLISH_ROOT="dashboards/pr-backlog"

          aws s3 cp pr_backlog.html \
            "s3://${PUBLISH_BUCKET}/${PUBLISH_ROOT}/index.html"
          aws s3 cp pr_backlog_history.json \
            "s3://${PUBLISH_BUCKET}/${PUBLISH_ROOT}/pr_backlog_history.json" || true
          aws s3 cp pr_backlog_cache.json \
            "s3://${PUBLISH_BUCKET}/${PUBLISH_ROOT}/pr_backlog_cache.json" || true
          echo "Report available at: https://${PUBLISH_DOMAIN}/${PUBLISH_ROOT}/index.html" \
            >> "${GITHUB_STEP_SUMMARY}"
